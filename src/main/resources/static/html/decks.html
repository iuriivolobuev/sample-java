<!DOCTYPE html>
<html lang="en-US">
<body>

<h1>Decks</h1>

<ul id="deck"></ul>
<script>
    fetch(`/api/deck/1`)
    .then(function(response) {
        return response.json();
    })
    .then((data) => {
        var deck = document.getElementById("deck");
        data.items.forEach((item) => {
            console.log(item);
            let li = document.createElement("li");
            li.innerText = item.left;
            deck.appendChild(li);
        });
    });
</script>

</body>
</html>
